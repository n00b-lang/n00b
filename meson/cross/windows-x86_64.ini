[binaries]
# compiler is supplied by build.sh (CC=ncc-bootstrap). For clang-based
# cross builds, set N00B_NCC_COMPILER=clang and
# N00B_TOOLCHAIN_TARGET=x86_64-w64-windows-gnu.
ar = 'x86_64-w64-mingw32-gcc-ar'
strip = 'x86_64-w64-mingw32-strip'

[host_machine]
system = 'windows'
cpu_family = 'x86_64'
cpu = 'x86_64'
endian = 'little'

[properties]
needs_exe_wrapper = true
# configure this in wrapper-enabled environments:
# exe_wrapper = 'wine64'
