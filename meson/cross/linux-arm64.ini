[binaries]
# compiler is supplied by build.sh (CC=ncc-bootstrap). For clang-based
# cross builds, set N00B_NCC_COMPILER=clang and
# N00B_TOOLCHAIN_TARGET=aarch64-linux-gnu.
ar = 'aarch64-linux-gnu-gcc-ar'
strip = 'aarch64-linux-gnu-strip'

[host_machine]
system = 'linux'
cpu_family = 'aarch64'
cpu = 'aarch64'
endian = 'little'

[properties]
needs_exe_wrapper = true
