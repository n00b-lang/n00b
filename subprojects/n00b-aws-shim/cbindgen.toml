# cbindgen configuration for n00b-aws-shim.
#
# cbindgen reads src/lib.rs (and its submodules) directly and emits a
# C header with the right `<stdint.h>` types for each Rust primitive.
# It replaces the demangle-on-cdylib step for the Rust shim — demangle
# stays in play for any C++ library we wrap, but for Rust source it
# segfaults on aws-sdk-rust's DWARF (see [[project_n00b_aws_via_rust_shim]]).
#
# Invocation (from meson):
#   cbindgen --config cbindgen.toml --crate n00b_aws_shim \
#            --output n00b_aws_shim_generated.h

language        = "C"
style           = "type"
no_includes     = false
sys_includes    = ["stddef.h", "stdint.h", "stdbool.h"]
includes        = ["util/dynamic_lib.h"]
# pragma once + an include guard
pragma_once     = true
header          = """\
// Auto-generated bindings for libn00b_aws_shim.
// Generated by cbindgen from subprojects/n00b-aws-shim/src/*.rs.
// Hand-edits will be lost on the next cargo build. See
// [[project_n00b_aws_via_rust_shim]] in the SKP auto-memory."""
autogen_warning = "/* WARNING: Do not modify — regenerate via meson. */"
documentation   = true
documentation_style = "doxy"

# Only export symbols that match the `n00b_aws_shim_` prefix. Anything
# else in the crate is internal — we don't want it bleeding into the
# C header.
[export]
prefix          = ""
include         = []
exclude         = []

[export.rename]
# cbindgen would otherwise emit `N00bAwsShim*` PascalCase types in
# the generated C header. Force every shim type to snake_case so the
# C wrap reads naturally and matches our `n00b_aws_shim_*` symbol
# prefix.
"N00bAwsShimConfig"                                = "n00b_aws_shim_config_t"
"N00bAwsShimStatus"                                = "n00b_aws_shim_status_t"
"N00bAwsShimAwsCredentials"                        = "n00b_aws_shim_aws_credentials_t"
"N00bAwsShimAssumedRoleUser"                       = "n00b_aws_shim_assumed_role_user_t"
"N00bAwsShimFederatedUser"                         = "n00b_aws_shim_federated_user_t"
"N00bAwsShimStsCallerIdentity"                     = "n00b_aws_shim_sts_caller_identity_t"
"N00bAwsShimStsAssumeRoleInput"                    = "n00b_aws_shim_sts_assume_role_input_t"
"N00bAwsShimStsAssumeRoleOutput"                   = "n00b_aws_shim_sts_assume_role_output_t"
"N00bAwsShimStsAssumeRoleWithWebIdentityInput"     = "n00b_aws_shim_sts_assume_role_with_web_identity_input_t"
"N00bAwsShimStsAssumeRoleWithWebIdentityOutput"    = "n00b_aws_shim_sts_assume_role_with_web_identity_output_t"
"N00bAwsShimStsAssumeRoleWithSamlInput"            = "n00b_aws_shim_sts_assume_role_with_saml_input_t"
"N00bAwsShimStsAssumeRoleWithSamlOutput"           = "n00b_aws_shim_sts_assume_role_with_saml_output_t"
"N00bAwsShimStsGetSessionTokenOutput"              = "n00b_aws_shim_sts_get_session_token_output_t"
"N00bAwsShimStsGetFederationTokenInput"            = "n00b_aws_shim_sts_get_federation_token_input_t"
