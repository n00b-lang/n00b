# Phase 5 § 5.6 — ClusterIssuer pointing at the in-cluster Pebble
# ACME server.
#
# `acme.caBundle` is the base64-encoded Pebble Mini-CA cert (the
# cert that signs Pebble's *directory* TLS endpoint).
# cert-manager uses this to verify the TLS connection to
# https://pebble.pebble.svc:14000/dir; without it the directory
# fetch fails with "x509: certificate signed by unknown authority".
#
# The encoded blob below is the upstream Pebble repo's
# test/certs/pebble.minica.pem (vendored under
# test/integration/phase5_k8s/pebble/) — public test crypto, no
# secret material involved; safe to inline.
#
# email is required by RFC 8555 + by Pebble.  Real LE for prod
# would point at someone reachable; the fixture uses a sentinel.
#
# We use a `pod` HTTP-01 solver instead of `ingress`: the kind
# cluster doesn't ship an ingress controller, and Pebble's
# challenge-validator hits httpPort=5002 by config — both Pebble
# and cert-manager's solver-pod live on the same kube-dns +
# CNI network, so the challenge resolves in-cluster end-to-end.

apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: phase5-pebble
spec:
  acme:
    server: https://pebble.pebble.svc:14000/dir
    email: phase5-fixture@example.invalid
    privateKeySecretRef:
      name: phase5-pebble-account-key
    caBundle: 
    solvers:
      - http01:
          # Use the in-cluster ingress-nginx controller (installed
          # by run.sh § 5.6).  cert-manager creates a temporary
          # Ingress for the challenge hostname; ingress-nginx
          # routes based on the Host header so Pebble (which has
          # the challenge hostname pinned to ingress-nginx via
          # /etc/hosts hostAliases) reaches the right solver Pod.
          ingress:
            ingressClassName: nginx
