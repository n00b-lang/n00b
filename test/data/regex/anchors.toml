matches = [[0, 3]]

[[test]]
name = "anchor_version_string_1_2_3"
pattern = '\A[0-2](\.[0-9]+)+\z'
input = "1.2.3"
matches = [[0, 5]]

[[test]]
name = "anchor_version_string_3_0"
pattern = '\A[0-2](\.[0-9]+)+\z'
