matches = []

[[test]]
name = "anchor_empty_no_match"
pattern = "^Purchase receipt$"
input = ""
matches = []

[[test]]
name = "anchor_decimal"
pattern = '^\d*\.?\d*$'
input = "3.14159"
matches = [[0, 7]]


[[test]]
name = "word_boundary_11_bare"
pattern = '\b11\b'
