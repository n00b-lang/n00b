matches = [[1, 9]]

[[test]]
name = "charclass_quoted_punct_no_match"
pattern = '''["'][^"']{0,30}[?!\.]["']'''
input = ' hello!" '
matches = []


[[test]]
name = "quantifier_bounded_repeat_1"
pattern = "ab{0,5}c"
input = "bbabbbbbc"
matches = [[2, 9]]

[[test]]
name = "quantifier_bounded_repeat_2"
pattern = "ab{0,5}c"
input = "bbbabbbbc"
matches = [[3, 9]]

[[test]]
name = "quantifier_bounded_repeat_3"
pattern = "ab{0,5}c"
input = "bbbbabbbc"
matches = [[4, 9]]

[[test]]
name = "quantifier_bounded_repeat_4"
pattern = "ab{0,5}c"
input = "bbbbbbbac"
matches = [[7, 9]]

[[test]]
name = "quantifier_bounded_repeat_5"
pattern = "ab{0,5}c"
input = "bbabbbcbbac"
matches = [[2, 7], [9, 11]]

[[test]]
name = "quantifier_group_plus"
pattern = "(ab)+"
input = "__abab__ab__"
matches = [[2, 6], [8, 10]]

[[test]]
name = "quantifier_a_plus"
pattern = "a+"
input = " aaa "
matches = [[1, 4]]

[[test]]
name = "quantifier_a_star_1"
pattern = "a*"
input = "bbbbaaabbbbb"
matches = [[0,0],[1,1],[2,2],[3,3],[4,7],[7,7],[8,8],[9,9],[10,10],[11,11],[12,12]]

[[test]]
name = "quantifier_a_star_2"
pattern = "a*"
input = "bbbb"
matches = [[0,0],[1,1],[2,2],[3,3],[4,4]]

[[test]]
name = "quantifier_wildcard_star"
pattern = "_*"
