[[test]]
name = "anchor_length_range_too_long"
pattern = '^.{4,8}$'
input = "asdfghjkl"
matches = []

[[test]]
name = "anchor_version_string_2_0"
pattern = '\A[0-2](\.[0-9]+)+\z'
