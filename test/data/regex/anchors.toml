description = '''
anchor, word boundary, character class, quantifier, alternation, and real-world tests.
matches = [[start, end]] in utf8 bytes (half-open intervals).
'''

[[test]]
name = "exact_string"
pattern = '^\A([^\: \t]+):\s*(.+)\z'
input = "\n:!"
matches = [[0, 3]]

[[test]]
name = "anchor_digit_exact"
pattern = '^\d$'
input = "1"
matches = [[0, 1]]

[[test]]
name = "anchor_z_bare"
pattern = '\z'
input = "abc"
matches = [[3, 3]]

[[test]]
name = "anchor_A_bare"
pattern = '\A'
input = "abc"
matches = [[0, 0]]


[[test]]
name = "string_anchor_A_z_star_no_match"
pattern = '\A[a-zA-Z]*\z'
input = "(asdf)asdf"
matches = []


[[test]]
name = "string_anchor_A_z_plus_no_match"
pattern = '\A[a-zA-Z]+\z'
input = "(asdf)asdf"
matches = []
[[test]]
name = "string_anchor_A_z_plus_match"
pattern = '\A[a-zA-Z]+\z'
input = "asdfasdf"
matches = [[0, 8]]

[[test]]
name = "string_anchor_A_z_star_match"
pattern = '\A[a-zA-Z]*\z'
input = "asdfasdf"
matches = [[0, 8]]


[[test]]
name = "anchor_digit_exact_no_match_multidigit"
pattern = '^\d$'
input = "324"
matches = []

[[test]]
name = "anchor_digit_exact_no_match_alpha"
pattern = '^\d$'
input = "a"
matches = []

[[test]]
name = "anchor_digits_star"
pattern = '^\d*$'
