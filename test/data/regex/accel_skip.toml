[[test]]
name = 'dotstar inner literal long skip'
pattern = '.*=.*'
input = 'aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaakey=value'
