[[test]]
name = "wb_exact_13"
pattern = '\b[a-z]{13}\b'
input = "hello world extraordinary"
vs_regex = true

[[test]]
name = "wb_exact_12_no_match"
pattern = '\b[a-z]{12}\b'
input = "hello world extraordinary"
vs_regex = true

[[test]]
name = "wb_word_plus"
pattern = '\b\w+\b'
input = "hello world"
vs_regex = true

[[test]]
name = "wb_digits"
pattern = '\b\d+\b'
input = "foo 123 bar"
vs_regex = true

[[test]]
name = "wb_lowercase_words"
pattern = '\b[a-z]+\b'
input = "hello WORLD foo"
vs_regex = true

[[test]]
name = "wb_partial_leading"
pattern = '\b11'
input = " 11"
vs_regex = true

[[test]]
name = "wb_partial_trailing"
pattern = '11\b'
input = "11 "
vs_regex = true

[[test]]
name = "wb_partial_trailing_bare"
pattern = '11\b'
input = "11"
vs_regex = true

[[test]]
name = "wb_contains_a"
pattern = '\b\w*a\w*\b'
input = "ffaff"
vs_regex = true

[[test]]
name = "wb_trailing_a"
pattern = 'a\b'
input = "a "
vs_regex = true

[[test]]
name = "wb_dash_boundary"
pattern = '\b-'
input = "1-2"
vs_regex = true

[[test]]
name = "wb_before_dash"
pattern = '1\b-'
input = "1-2"
vs_regex = true

[[test]]
name = "wb_across_dash"
pattern = '1\b-2'
input = "1-2"
vs_regex = true

[[test]]
name = "wb_no_match_embedded"
pattern = '\b11\b'
input = "a11b"
vs_regex = true

[[test]]
name = "wb_adjacent_words"
pattern = '\b[a-z]+\b'
input = "cat dog bird"
vs_regex = true

[[test]]
name = "wb_bounded_rep_at_boundary"
pattern = '\b[a-z]{3,5}\b'
input = "cat extraordinary dog bird"
vs_regex = true

[[test]]
name = "wb_whitespace_neighbor"
pattern = '\s\b[a-z]+\b\s'
input = " cat "
vs_regex = true

[[test]]
name = "wb_after_whitespace_class"
pattern = '[ \t]\b\w+'
input = " hello\tworld"
vs_regex = true

[[test]]
name = "wb_alpha_class_union"
pattern = '\b[a-zA-Z]+\b'
input = "Hello WORLD foo 123"
vs_regex = true

[[test]]
name = "wb_alnum_class"
pattern = '\b[a-zA-Z0-9]+\b'
input = "foo123 !bar! 42"
vs_regex = true

