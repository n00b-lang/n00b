description = '''
word boundary tests, cross-validated against the regex crate.
'''

[[test]]
name = "basic_boundary"
pattern = '(and|AND)\b(.*)'
input = "xxxxxANDyyyyy"
vs_regex = true

[[test]]
name = "basic_boundary"
pattern = '(and|AND)\b(.*)'
input = "xxxxxANDyyyyy"
vs_regex = true

[[test]]
name = "wb_bare_11"
pattern = '\b11\b'
input = "11"
vs_regex = true

[[test]]
name = "wb_leading_space"
pattern = '\b11\b'
input = " 11"
vs_regex = true

[[test]]
name = "wb_trailing_space"
pattern = '\b11\b'
input = "11 "
vs_regex = true

[[test]]
name = "wb_both_spaces"
pattern = '\b11\b'
input = " 11 "
vs_regex = true

[[test]]
name = "wb_long_word_12plus"
