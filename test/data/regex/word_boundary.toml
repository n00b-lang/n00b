[[test]]
name = "wb_the_basic"
pattern = '\bthe\b'
input = "foo the bar"
vs_regex = true

[[test]]
name = "wb_the_multiple"
pattern = '\bthe\b'
input = "the cat and the dog and the fish"
vs_regex = true

[[test]]
name = "wb_the_no_match"
pattern = '\bthe\b'
input = "other breathe"
vs_regex = true

[[test]]
name = "wb_the_start_end"
pattern = '\bthe\b'
input = "the"
vs_regex = true

[[test]]
name = "wb_the_adjacent"
pattern = '\bthe\b'
input = "!the! .the. the"
vs_regex = true

[[test]]
name = "word_border_star"
pattern = '\bTrue\b *'
input = "True"
matches = [[0, 4]]

[[test]]
name = "word_border_req_word_trailing_no_match"
pattern = '!!\b'
input = "!!"
matches = []

[[test]]
name = "word_border_req_word_leading_no_match"
pattern = '\b!!'
input = "!!"
matches = []

[[test]]
name = "word_border_req_word_leading_match"
pattern = '\b!!'
input = "a!!"
matches = [[1, 3]]

[[test]]
name = "word_border_req_word_trailing_match"
pattern = '!!\b'
input = "!!a"
matches = [[0, 2]]

[[test]]
name = "word_boundary_ip_trailing_b_not_boundary"
pattern = '2(\.([0-1]?[0-9]{1,2}|2[0-4][0-9])){3}\b'
input = "2.3.3.3a!"
matches = []

[[test]]
name = "repro_unanchored_fwd_ascii_word"
pattern = '\w\w-\w\w'
input = "xxxxx00-00yyyyy"
matches = [[5, 10]]
