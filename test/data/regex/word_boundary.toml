[[test]]
name = "wb_long_word_multiple"
pattern = '\b[a-z]{12,}\b'
input = "understanding communication"
vs_regex = true

[[test]]
name = "wb_long_word_mixed_case"
pattern = '\b[a-z]{12,}\b'
input = "THE understanding OF communication HERE"
vs_regex = true

[[test]]
name = "wb_long_word_at_start"
pattern = '\b[a-z]{12,}\b'
input = "extraordinary!"
vs_regex = true

[[test]]
name = "wb_long_word_at_end"
