# docker-compose stub for the nginx-quic H3 interop fixture.
#
# Driven by start.sh (port allocation, cert generation, nginx.conf
# templating, readiness probe, fingerprint capture).  Don't
# `docker compose up` directly — start.sh templates nginx.conf with
# the chosen port and writes it into NGINX_QUIC_CERT_DIR.
#
# Image pinning: see test/fixtures/README-h3.md.

services:
  nginx:
    # Official `nginx:mainline` ships with --with-http_v3_module since
    # 1.25.  We pin to a specific patch tag for reproducibility; the
    # README explains how to refresh it.
    image: nginx:1.29.8
    container_name: ${NGINX_QUIC_CONTAINER:-n00b-test-nginx-quic}
    # nginx serves HTTPS over TCP and QUIC/UDP on the same port.
    ports:
      - "127.0.0.1:${NGINX_QUIC_PORT}:${NGINX_QUIC_PORT}/tcp"
      - "127.0.0.1:${NGINX_QUIC_PORT}:${NGINX_QUIC_PORT}/udp"
    volumes:
      # start.sh renders nginx.conf with NGINX_QUIC_PORT and writes
      # it into NGINX_QUIC_CERT_DIR alongside the generated cert.
      - ${NGINX_QUIC_CERT_DIR}/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${NGINX_QUIC_CERT_DIR}:/etc/nginx/certs:ro
    restart: "no"
