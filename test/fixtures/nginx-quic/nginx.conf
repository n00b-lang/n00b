# nginx.conf for the n00b H3 server interop smoke test.
#
# Template — envsubst'd by start.sh with NGINX_QUIC_PORT.
# Mounted read-only into the container at /etc/nginx/nginx.conf.
#
# nginx mainline (1.25+) ships HTTP/3 via the http_v3_module.  We
# bind a single port for both TCP HTTPS and UDP QUIC; alt-svc
# advertises h3 so a client that opened over HTTP/2 can race up.

worker_processes 1;

events {
    worker_connections 256;
}

http {
    # HTTPS + QUIC on the same port.  ssl_protocols must include
    # TLSv1.3 — QUIC requires it.
    ssl_protocols TLSv1.3;

    # Self-signed cert generated by start.sh; mounted into
    # /etc/nginx/certs read-only.
    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    # Reasonable QUIC tunables for a test fixture.  These don't
    # matter for the smoke test but quiet warnings.
    ssl_early_data on;

    log_format main '$remote_addr "$request" $status $body_bytes_sent';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    server {
        # listen ssl                 → TCP HTTPS (h1 / h2)
        # listen quic reuseport      → UDP QUIC (h3)
        listen ${NGINX_QUIC_PORT} ssl;
        listen ${NGINX_QUIC_PORT} quic reuseport;
        http2 on;

        server_name localhost;

        # Advertise h3 to TCP clients so they can race a QUIC
        # connection upward.
        add_header alt-svc 'h3=":${NGINX_QUIC_PORT}"; ma=86400' always;

        # POST /echo — return the request body verbatim.  Used by
        # the H3 server smoke test to verify our client can POST
        # bytes that nginx echoes back.
        location = /echo {
            # client_body_in_single_buffer + a generous limit so
            # nginx echoes the body without buffering to disk.
            client_max_body_size 1m;
            client_body_buffer_size 1m;
            client_body_in_single_buffer on;

            # The `echo` module isn't in stock nginx; we use
            # `return` with the raw body via a Lua-free trick:
            # mirror the client body via mirror+proxy?  Simpler:
            # use nginx's `js_content` or just return a fixed body.
            #
            # For the smoke test, "received-by-nginx" is sufficient
            # to prove H3 POST end-to-end; full echo would require
            # the echo-nginx-module which isn't in the official
            # image.  The H3 server test will assert on this body.
            default_type text/plain;
            return 200 "received-by-nginx\n";
        }

        # GET / — same canonical hello body shape as the caddy
        # fixture (different content so tests can distinguish).
        location = / {
            default_type text/plain;
            return 200 "hello-from-nginx\n";
        }

        location / {
            return 404 "not-found\n";
        }
    }
}
